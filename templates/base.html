<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_desc %}3D Steganography & Encryption Vault — Hide secret messages invisibly inside 3D model files using LSB vertex color encoding.{% endblock %}" />
  <title>{% block title %}3D Steg Vault{% endblock %} | 3D Steganography & Encryption Vault</title>

  <!-- Fonts: DM Serif Display (headings) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <!-- Three.js Import Map (must be before any module scripts) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="/" class="navbar__brand" aria-label="Home">
      <div class="navbar__brand-icon" aria-hidden="true">🔐</div>
      <span>Steg<strong>Vault</strong></span>
    </a>

    <ul class="navbar__links" id="nav-links">
      <li><a href="/"        id="nav-home"    {% if request.endpoint == 'index'   %}class="active"{% endif %}>Home</a></li>
      <li><a href="/encode"  id="nav-encode"  {% if request.endpoint == 'encode'  %}class="active"{% endif %}>Encode</a></li>
      <li><a href="/models"  id="nav-models"  {% if request.endpoint == 'models'  %}class="active"{% endif %}>Models</a></li>
      <li><a href="/decode"  id="nav-decode"  {% if request.endpoint == 'decode'  %}class="active"{% endif %}>Decode</a></li>
    </ul>

    <div class="navbar__actions">
      <button id="theme-toggle" class="btn-theme" aria-label="Toggle dark/light mode" title="Toggle theme">☀️</button>
      <button id="nav-menu-btn" class="btn-theme" aria-label="Open menu" style="display:none" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
    </div>
  </nav>

  <!-- ── Page Content ───────────────────────────────────────────── -->
  <main class="page-wrapper" id="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo"></footer>

  <!-- Theme script (non-module, runs immediately) -->
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

  <!-- Responsive nav menu show/hide -->
  <script>
    (function() {
      const menuBtn = document.getElementById('nav-menu-btn');
      if (window.innerWidth <= 768 && menuBtn) menuBtn.style.display = 'flex';
      window.addEventListener('resize', () => {
        if (menuBtn) menuBtn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
        if (window.innerWidth > 768) {
          document.getElementById('nav-links').classList.remove('open');
        }
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
